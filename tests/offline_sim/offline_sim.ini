; tests/offline_sim/offline_sim.ini
;
; 离线仿真专用配置(《测试需求.md》§3.5 / §7.3 / §7.5 / §7.7 / §7.8)。与 config.ini 解耦,
; 不污染生产配置。K 是皮带机械常数,跨机器跨时间复用,故入库;特殊机器若需
; 本地覆盖,用 main.cpp 的 --k <float> 命令行参数。

[encoder]
; -----------------------------------------------------------------------------
; K = mm/ms·per_rpm,定义 v[mm/ms] = K * rpm[r/min]。
; 当前生效值(M4 修复 T1/T2 关联失效后,v1.5):
;   k_mm_per_ms_per_rpm = 0.00894
; 来源:**手工反推(M4 测试机首跑 K=0.00812397 实测发现 ~10% 系统偏差,详见
;       §7.7 § 7.8)**。基于 11:05 段(应用段)单物体跨帧位移实测:
;          T1 image bbox y 从 13993ms 的 714 到 14993ms 的 1608,1000 ms 内移动
;          894 image px;imgHeightPx=2048,realWidthMm=1270 → pxToMmY=0.620。
;          v_real = 894 × 0.620 / 1000 = 0.5546 mm/ms。
;          log 同窗口 RPM=62。
;          K_real = 0.5546 / 62 = 0.00894 mm/ms·per_rpm。
; 验证:第二轮 M4 重跑(--k 0.00894)用户原报 case 100% 修复,绿瓶 T1 跨
;       0017_t13264 → 0018_t14264 成功合并;整体合并率 47% → 53%(新建 track
;       数本身受物体出入视野约束)。
;
; 与原标定值 0.00812397 的偏差 ~10% 来源:§7.6 F7 标定段误用 11:26 段
; (RPM=91)而非应用段 11:05(RPM=62);两段 K 在皮带打滑/log 上报 RPM 抖动
; 影响下并非完全一致(机械常数假设有限);P2 待 calibrate F7 修后用 session=0
; 重新正式标定再回填本节。
; -----------------------------------------------------------------------------
k_mm_per_ms_per_rpm = 0.00894

; 配套溯源信息(原 calibrate_rpm_to_speed 输出值,保留作历史对照)
fit_r_squared            = 0.998536
rpm_mean                 = 91.0000
calib_run_ts             = 20260505_134402
calib_seq_window         = 238..242
calib_session_actual     = 1   ; 实际拟合用的是 11:26 段(因 selectCaptures 同 seq 跨段
                               ; 覆盖,session=0 11:05 段 seq=238 物体仍未入视野;
                               ; 见《测试需求.md》§7.6 已知问题登记)
calib_v_real_mm_per_ms   = 0.739281
calib_residual_max_mm    = 5.2623

; 手工反推值溯源(v1.5,M4 T1/T2 case 修复)
manual_k_run_ts          = 20260505_152633
manual_k_session         = 0     ; 11:05 段(应用段)
manual_k_basis_obj       = "T1 13264→14264 跨帧 image y 位移 (778→765 / 0→865)"
manual_k_basis_v_mm_ms   = 0.5546
manual_k_basis_rpm       = 62
manual_k_validation      = "K=0.00894 重跑 M4: 合并率 47%→53%, 用户原报 T1/T2 case 修复"
